# 幸運値表示設定
luck_display:
  enabled: true                    # 幸運値表示機能の有効/無効
  show_details: false              # 詳細な内訳表示（宝釣り、ポーション、装備、天気ボーナス）
  update_interval: 20              # 更新間隔（tick、20 = 1秒）

# メッセージ設定
messages:
  reload_success: "&aCustomizeFishing設定をリロードしました！"
  reload_error: "&c設定リロードエラー: %error%"
  no_permission: "&cこのコマンドを使用する権限がありません！"
