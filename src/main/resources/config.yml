# CustomizeFishing 設定ファイル

# プラグインの有効/無効
enabled: true

# ダブルフィッシング設定
# 宝釣りLv10以上かつコンジットパワーLv2以上で発動
double_fishing:
  enabled: true    # ダブルフィッシング機能の有効/無効

# エンチャント制御設定
# ゲームが壊れるエンチャントレベルをプラグイン側で確実に制御する
enchant_limits:
  enabled: true
  # 釣り上げたアイテムに付与されるエンチャントの上限（生成時にこのレベルへ切り詰める）
  # キー: エンチャントID、値: 最大レベル
  item_caps:
    # minecraft:lure: 5           # 例: 入れ食いを配布時にLv5へ切り詰める場合
  # バニラが正常動作する入れ食いの上限レベル
  # これを超える竿（Lv6以上）はバニラでは浮きが一切沈まなくなるため、プラグインが待ち時間を独自計算する:
  # Lv5相当(1〜100tick)を基準に超過1レベルごとに最大待ち時間を1tick短縮、Lv105以上でほぼ着水即ヒット
  lure_behavior_cap: 5
  # 例外レベル: この入れ食いレベルの竿は補正せず、バニラの挙動のまま＝浮きが一切沈まない
  # 伝説釣り竿? のようなジョーク竿用
  lure_exception_levels:
    - 127

# 天気による幸運ボーナス
# 各天気時に追加される幸運値
weather_luck:
  clear: 0.0
  rain: 0.35
  thunder: 0.70

# 幸運効果設定
# 幸運ポーションと不幸ポーションの影響を定義
luck_effects:
  # 幸運ポーション効果（正の値）
  luck_potion:
    per_level: 0.35    # レベルごとの幸運ボーナス（%）
    max_level: 10      # 最大レベル
    min_level: -10     # 最小レベル（負の値も許可）
  
  # 不幸ポーション効果（負の値）
  unluck_potion:
    per_level: -2.00   # レベルごとの幸運ペナルティ（%）
    max_level: 10      # 最大レベル
    min_level: 1       # 最小レベル
  
  # 装備幸運値
  equipment_luck:
    per_point: 0.1     # ポイントごとの幸運ボーナス（%）
    max_value: 100     # 最大値
    min_value: -50     # 最小値（負の値も許可）
  
  # 宝釣りエンチャント
  # Lv1〜base_levels は per_level の線形、それ以降 max_level までは対数カーブで緩やかに効果が伸びる
  # 超過分ボーナス = extended_log_scale × ln(1 + 超過レベル)
  # 例: Lv10=+5.0 / Lv20=+11.0 / Lv50=+14.3 / Lv127=+16.9
  luck_of_the_sea:
    per_level: 0.50           # レベルごとの幸運ボーナス（%）
    max_level: 127            # 効果が伸びる最大レベル
    min_level: 0              # 最小レベル
    base_levels: 10           # フルレート(per_level)が適用されるレベル範囲
    extended_log_scale: 2.5   # base_levels超過分の対数カーブ係数（0で無効）
    # 特殊ボーナス（宝釣りLv127以上）
    special_bonus:
      enabled: true
      min_level: 127   # 特殊ボーナス発動レベル
      conduit_multiplier: true # コンジットパワーによる倍率適用
  
  # 経験値レベル
  experience_level:
    per_level: 0.05    # レベルごとの幸運ボーナス（%）
    max_level: 100     # 最大レベル
    min_level: 0       # 最小レベル

# タイミングシステム設定
# 浮きが沈んでからの反応時間によるボーナス
timing_system:
  enabled: true                   # タイミングシステムの有効/無効
  base_luck_bonus: 1.8           # ベースの幸運ボーナス
  
  # タイミングティア設定（ミリ秒とボーナス倍率）
  tiers:
    just:
      max_time_ms: 50
      bonus_multiplier: 0.5
    perfect:
      max_time_ms: 100
      bonus_multiplier: 0.4
    great:
      max_time_ms: 300
      bonus_multiplier: 0.3
    good:
      max_time_ms: 750
      bonus_multiplier: 0.2


# 幸運と不幸の相殺計算
# 幸運効果と不幸効果は自動的に相殺されます
# 例: 幸運Lv3 + 不幸Lv2 = 幸運Lv1相当
luck_calculation:
  min_total_luck: -25.0
  max_total_luck: 25.0

categories:
  # ===== 超高レア度 =====
  god:
    enabled: true
    priority: 2
    quality: 1
    conditions:
      require_open_water: true        # 開水域が必要
      min_luck_of_the_sea: 10
      min_luck_effect: 6
      weather:
        - "thunder"
    chance: 0.05

  cosmic:
    enabled: true
    priority: 3
    quality: 1
    conditions:
      require_open_water: true
      min_luck_of_the_sea: 10
      min_luck_effect: 5
      weather:
        - "thunder"
    chance: 0.0001

  divine:
    enabled: true
    priority: 4
    quality: 1
    conditions:
      require_open_water: true
      min_luck_of_the_sea: 10
      min_luck_effect: 4
      weather:
        - "rain"
        - "thunder"
    chance: 0.001

  # ===== 高レア度 =====
  celestial:
    enabled: true
    priority: 5
    quality: 1
    conditions:
      require_open_water: true
      min_luck_of_the_sea: 6
      min_luck_effect: 3
      weather:
        - "rain"
        - "thunder"
    chance: 0.01

  beyond:
    enabled: true
    priority: 6
    quality: 1
    conditions:
      require_open_water: true        # 開水域が必要
      min_luck_of_the_sea: 5         # 宝釣りレベル5以上
      min_luck_effect: 3             # 幸運エフェクトレベル3以上
      weather:
        - "clear"                     # 全天候対応
        - "rain"
        - "thunder"
    chance: 0.1

  arcana:
    enabled: true
    priority: 7
    quality: 1
    conditions:
      require_open_water: true        # 開水域が必要
      min_luck_of_the_sea: 5         # 宝釣りレベル5以上
      min_luck_effect: 3             # 幸運エフェクトレベル3以上
      weather:
        - "clear"                     # 全天候対応
        - "rain"
        - "thunder"
    chance: 0.5

  immortal:
    enabled: true
    priority: 8
    quality: 1
    conditions:
      require_open_water: true        # 開水域が必要
      min_luck_of_the_sea: 4         # 宝釣りレベル4以上
      min_luck_effect: 2             # 幸運エフェクトレベル2以上
      weather:
        - "clear"                     # 全天候対応
        - "rain"
        - "thunder"
    chance: 1

  # ===== 中レア度 =====
  legendary:
    enabled: true
    priority: 9
    quality: 2
    conditions:
      require_open_water: true        # 開水域が必要
      min_luck_of_the_sea: 4         # 宝釣りレベル4以上
      min_luck_effect: 1             # 幸運エフェクトレベル1以上
      weather:
        - "clear"                     # 全天候対応
        - "rain"
        - "thunder"
    chance: 5

  rare:
    enabled: true
    priority: 10
    quality: 2
    conditions:
      require_open_water: true        # 開水域が必要
      min_luck_of_the_sea: 3         # 宝釣りレベル3以上
      min_luck_effect: 1             # 幸運エフェクトレベル1以上
      weather:
        - "clear"                     # 全天候対応
        - "rain"
        - "thunder"
    chance: 10

  uncommon:
    enabled: true
    priority: 11
    quality: 2
    conditions:
      require_open_water: true       # 開水域不要
      min_luck_of_the_sea: 3         # 宝釣りレベル3以上
      min_luck_effect: 1             # 幸運エフェクトレベル1以上
      weather:
        - "clear"                     # 全天候対応
        - "rain"
        - "thunder"
    chance: 15

  # ===== 低レア度 =====
  common:
    enabled: true
    priority: 12
    quality: 2
    conditions:
      require_open_water: true       # 開水域不要
      weather:
        - "clear"                     # 全天候対応
        - "rain"
        - "thunder"
    chance: 30

  # ※ treasure / fish / junk ティアは廃止（ルートテーブル削除済み）。
  #   抽選外れ時はバニラの釣り結果がそのまま使用されます。

  # ===== 特殊カテゴリ =====
  unique:
    enabled: true
    priority: 1
    quality: 1
    conditions:
      require_open_water: true
      min_luck_of_the_sea: 10
      min_luck_effect: 10
      weather:
        - "rain"
        - "thunder"
    chance: 0.00000005

  dolphins_grace:
    enabled: true
    priority: 0
    quality: 0
    conditions:
      require_open_water: true        # 開水域が必要
      require_dolphins_grace: true    # イルカの好意エフェクトが必要
      weather:
        - "clear"                     # 晴れ天候限定
    chance: 100.0



